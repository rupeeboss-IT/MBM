<main class="welcome-page">
  <section class="welcome-card" aria-label="Welcome back panel">
    <p class="eyebrow">Dashboard</p>
    <h1>Welcome back, Alex 👋</h1>
    <p class="subtitle">
      You have 4 pending tasks and 2 events today. Let's keep your momentum going.
    </p>

    <div class="stats" role="list" aria-label="Quick stats">
      <article class="stat" role="listitem">
        <p class="label">Tasks Due</p>
        <p class="value">4</p>
      </article>
      <article class="stat" role="listitem">
        <p class="label">Messages</p>
        <p class="value">12</p>
      </article>
      <article class="stat" role="listitem">
        <p class="label">Progress</p>
        <p class="value">78%</p>
      </article>
    </div>

    <div class="actions">
      <button type="button" class="btn btn-primary">Continue Working</button>
      <button type="button" class="btn btn-secondary">View Schedule</button>
    </div>
  </section>
</main>
