@if (visible()) {
  <div class="cookie-banner" role="dialog" aria-label="Cookie consent" aria-live="polite">
    <div class="cookie-banner__inner">
      <span class="cookie-banner__icon" aria-hidden="true">🍪</span>
      <div class="cookie-banner__content">
        <p class="cookie-banner__text">
          We use cookies and similar technologies to improve your experience on our site.
          By clicking <strong>Accept</strong>, you agree to our use of cookies as described in our
          <a routerLink="/privacy-policy" class="cookie-banner__link">Privacy Policy</a>.
        </p>
      </div>
      <div class="cookie-banner__actions">
        <button type="button" class="cookie-banner__accept" (click)="accept()">Accept</button>
        <button type="button" class="cookie-banner__close" (click)="close()" aria-label="Close cookie notice">✕</button>
      </div>
    </div>
  </div>
}
