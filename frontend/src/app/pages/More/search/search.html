<!-- ===== SEARCH PAGE ===== -->
<div class="page active" id="page-search">
  <div class="page-header">
    <div class="container">
      <h1>Search</h1>
      <p>Find services, schemes, events and articles</p>
    </div>
  </div>
  <section class="section">
    <div class="container">
      <form class="search-form-bar" (ngSubmit)="submitSearch()">
        <input
          type="search"
          class="search-form-input"
          name="q"
          [(ngModel)]="query"
          placeholder="Search MSME services, schemes, events..."
          autocomplete="off"
          aria-label="Search">
        <button type="submit" class="btn-primary search-form-submit">Search</button>
      </form>

      <div class="search-results-area" id="searchResultsArea">
        <ng-container *ngIf="query.trim().length > 0; else emptyState">
          <p class="search-results-meta">
            Showing results for <strong>{{ query }}</strong>
          </p>

          <div *ngIf="serviceResults.length > 0; else noResults" class="search-results-section">
            <h2 class="search-results-heading">Services</h2>
            <div class="search-results-grid">
              <a
                *ngFor="let item of serviceResults"
                class="search-result-card"
                [attr.href]="'/service/' + item.slug"
                (click)="goToService($event, item.slug)">
                <span class="search-result-card__icon" aria-hidden="true">{{ item.emoji }}</span>
                <span class="search-result-card__body">
                  <span class="search-result-card__title">{{ item.title }}</span>
                  <span class="search-result-card__subtitle">{{ item.subtitle }}</span>
                </span>
              </a>
            </div>
          </div>
        </ng-container>

        <ng-template #emptyState>
          <p class="search-state-msg">Enter a search term to find services, schemes, events and articles.</p>
        </ng-template>
        <ng-template #noResults>
          <p class="search-state-msg">No results found. Try a different keyword.</p>
        </ng-template>
      </div>
    </div>
  </section>
</div><!-- /search -->
