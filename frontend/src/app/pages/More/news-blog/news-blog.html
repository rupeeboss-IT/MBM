<!-- ===== NEWS PAGE ===== -->
<div class="page active" id="page-news">
<div class="page-header"><div class="container"><h1>News, Blog & Success Stories</h1><p>Latest updates from the MSME ecosystem, expert insights and success stories</p></div></div>
<section class="section"><div class="container">
  <div class="zone-filter">
    <button class="filter-btn" [class.active]="active()==='all'" (click)="setFilter('all')">All</button>
    <button class="filter-btn" [class.active]="active()==='news'" (click)="setFilter('news')">News</button>
    <button class="filter-btn" [class.active]="active()==='blog'" (click)="setFilter('blog')">Blog</button>
    <button class="filter-btn" [class.active]="active()==='success'" (click)="setFilter('success')">Success Stories</button>
  </div>
  <div class="news-grid" id="newsGrid">
    <div
      class="news-card"
      *ngFor="let a of filtered()"
      [attr.data-cat]="a.data.category"
      [routerLink]="['/article', a.slug]"
    >
      <div [class]="a.data.cardClass">{{ a.data.cardIcon }}</div>
      <div class="news-body">
        <span [class]="a.data.badgeClass">{{ a.data.badgeText }}</span>
        <h3>{{ a.data.title }}</h3>
        <p>{{ a.data.summary }}</p>
        <div class="news-date">{{ a.data.dateLabel }}</div>
      </div>
    </div>
  </div>
</div></section>
</div><!-- /news -->
