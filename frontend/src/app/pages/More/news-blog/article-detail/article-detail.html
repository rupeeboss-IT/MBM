<!-- ===== ARTICLE DETAIL PAGE ===== -->
@if (loading()) {
  <div class="page active" id="page-article-detail">
    <div class="page-header">
      <div class="container">
        <div class="breadcrumb"><a routerLink="/home">Home</a><span class="sep">›</span><a routerLink="/news">News & Blog</a><span class="sep">›</span><span>Loading…</span></div>
        <h1 style="opacity:.5">Loading article…</h1>
      </div>
    </div>
    <section class="section">
      <div class="container article-detail-container">
        <div class="article-skeleton"></div>
      </div>
    </section>
  </div>
}

@if (!loading() && article(); as art) {
  <div class="page active" id="page-article-detail">
    <div class="page-header">
      <div class="container">
        <div class="breadcrumb"><a routerLink="/home">Home</a><span class="sep">›</span><a routerLink="/news">News &
            Blog</a><span class="sep">›</span><span id="articleCrumb">{{ art.crumb }}</span></div>
        <h1 id="articleTitle">{{ art.title }}</h1>
        <p id="articleMeta" style="color:rgba(255,255,255,.7)">{{ art.meta }}</p>
      </div>
    </div>
    <section class="section">
      <div class="container article-detail-container">
        <img *ngIf="art.imageUrl" class="article-hero-img" [src]="art.imageUrl" [alt]="art.title" width="900"
          height="480" />
        <div class="article-content" id="articleContent">
          <div [innerHTML]="safeHtml()"></div>
        </div>
      </div>
    </section>
  </div>
}
