<!-- ===== ARTICLE DETAIL PAGE ===== -->
<div class="page active" id="page-article-detail" *ngIf="article() as art">
<div class="page-header"><div class="container"><div class="breadcrumb"><a routerLink="/home">Home</a><span class="sep">›</span><a routerLink="/news">News & Blog</a><span class="sep">›</span><span id="articleCrumb">{{ art.crumb }}</span></div><h1 id="articleTitle">{{ art.title }}</h1><p id="articleMeta" style="color:rgba(255,255,255,.7)">{{ art.meta }}</p></div></div>
<section class="section"><div class="container" style="max-width:900px">
  <div class="article-content" id="articleContent"><div [innerHTML]="safeHtml()"></div></div>
  <div style="margin-top:3rem;padding-top:2rem;border-top:1px solid var(--border)">
    <strong style="font-size:.9rem;color:var(--muted)">Share this article:</strong>
    <div class="share-btns" style="margin-top:.8rem">
      <button class="share-btn" onclick="shareContent('whatsapp')">📱 WhatsApp</button>
      <button class="share-btn" onclick="shareContent('linkedin')">💼 LinkedIn</button>
      <button class="share-btn" onclick="copyLink()">🔗 Copy Link</button>
    </div>
  </div>
</div></section>
</div><!-- /article -->
