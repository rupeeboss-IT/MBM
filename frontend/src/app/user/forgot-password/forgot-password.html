<!-- ===== FORGOT PASSWORD PAGE ===== -->
<div class="page active" id="page-forgot-password">
<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-logo"><span style="font-size:2rem">🔑</span><h2>Forgot Password</h2><p>Enter your email to reset your password</p></div>
    <form *ngIf="step() === 1" [formGroup]="emailForm" (ngSubmit)="sendOtp()">
      <div class="form-group">
        <label>Email Address *</label>
        <input type="email" placeholder="your@email.com" formControlName="email" autocomplete="email">
      </div>
      <button type="submit" class="btn-submit" [disabled]="submitting()">Send OTP</button>
      <div class="auth-footer" style="margin-top:.9rem">
        <a [routerLink]="['/login']" style="cursor:pointer">← Back to Login</a>
      </div>
    </form>

    <form *ngIf="step() === 2" [formGroup]="resetForm" (ngSubmit)="resetPassword()">
      <div class="form-group">
        <label>Email Address *</label>
        <input type="email" formControlName="email" autocomplete="email" readonly>
      </div>
      <div class="form-group">
        <label>OTP *</label>
        <input type="text" placeholder="Enter OTP" formControlName="code" inputmode="numeric" autocomplete="one-time-code">
      </div>
      <div class="form-group">
        <label>New Password *</label>
        <input type="password" placeholder="New password (min 8 chars)" formControlName="newPassword" autocomplete="new-password">
      </div>
      <button type="submit" class="btn-submit" [disabled]="submitting()">Update Password</button>
      <div class="auth-footer" style="display:flex;justify-content:space-between;gap:1rem;margin-top:.9rem">
        <a (click)="back()" style="cursor:pointer">← Change Email</a>
        <a [routerLink]="['/login']" style="cursor:pointer">Back to Login →</a>
      </div>
    </form>
  </div>
</div>
</div><!-- /forgot -->
