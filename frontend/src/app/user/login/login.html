<!-- ===== LOGIN PAGE ===== -->
<div class="page active" id="page-login">
<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-logo">
      <img class="brand-logo brand-logo--auth" src="/assets/mbmlogo.png" alt="MSME Bharat Manch" width="72" height="72" />
      <h2>Welcome Back</h2><p>Login to your MSME Bharat Manch account</p>
    </div>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label>Email or Mobile Number *</label>
        <input
          type="text"
          placeholder="Enter your email or 10-digit mobile"
          formControlName="identifier"
          autocomplete="username"
        >
      </div>
      <div class="form-group">
        <label>Password *</label>
        <app-password-input
          placeholder="Your password"
          formControlName="password"
          autocomplete="current-password"
        ></app-password-input>
      </div>
      <button type="submit" class="btn-submit" [disabled]="submitting()">Login</button>
    </form>
    <div style="text-align:center;margin-top:1rem"><a [routerLink]="['/forgot-password']" style="color:var(--red);font-size:.88rem;cursor:pointer">Forgot Password?</a></div>
    <div class="auth-divider">or</div>
    <div class="auth-footer">
      New here?
      @if (registerCta.queryParams) {
        <a [routerLink]="['/register']" [queryParams]="registerCta.queryParams">{{ registerCta.label }}</a>
      } @else {
        <a [routerLink]="['/register']">{{ registerCta.label }}</a>
      }
    </div>
  </div>
</div>
</div><!-- /login -->
