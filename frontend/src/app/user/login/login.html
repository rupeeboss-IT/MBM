<!-- ===== LOGIN PAGE ===== -->
<div class="page active" id="page-login">
<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-logo"><span class="brand-icon" style="font-size:2.5rem">🏛️</span><h2>Welcome Back</h2><p>Login to your MSME Bharat Manch account</p></div>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label>Email or Mobile Number *</label>
        <input
          type="text"
          placeholder="Enter your email or 10-digit mobile"
          formControlName="identifier"
          autocomplete="username"
        >
      </div>
      <div class="form-group">
        <label>Password *</label>
        <input
          type="password"
          placeholder="Your password"
          formControlName="password"
          autocomplete="current-password"
        >
      </div>
      <button type="submit" class="btn-submit" [disabled]="submitting()">Login</button>
    </form>
    <div style="text-align:center;margin-top:1rem"><a [routerLink]="['/forgot-password']" style="color:var(--red);font-size:.88rem;cursor:pointer">Forgot Password?</a></div>
    <div class="auth-divider">or</div>
    <!-- <div style="text-align:center;background:var(--gray);border-radius:8px;padding:1rem;font-size:.85rem;color:var(--muted)">
      <strong style="color:var(--navy);display:block;margin-bottom:.3rem">Demo User Login</strong>
      Email: user@msmebharatmanch.com<br>Password: User@123
    </div> -->
    <div class="auth-footer">New here? <a [routerLink]="['/register']">Create free account</a></div>
  </div>
</div>
</div><!-- /login -->
