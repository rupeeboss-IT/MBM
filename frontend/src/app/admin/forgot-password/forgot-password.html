<!-- ===== FORGOT PASSWORD PAGE ===== -->
<div class="page active" id="page-forgot-password">
<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-logo"><span style="font-size:2rem">🔑</span><h2>Forgot Password</h2><p>Enter your email to reset your password</p></div>
    <div id="forgotSuccess" style="display:none" class="success-msg">✅ Password reset link sent to your email.</div>
    <form id="forgotForm" onsubmit="doForgotPass(event)">
      <div class="form-group"><label>Email Address *</label><input type="email" id="forgotEmail" placeholder="your@email.com" required></div>
      <button type="submit" class="btn-submit">Send Reset Link</button>
    </form>
    <div class="auth-footer"><a [routerLink]="['/admin-login']" style="cursor:pointer">← Back to Login</a></div>
  </div>
</div>
</div><!-- /forgot -->
