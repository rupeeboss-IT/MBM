<!-- ===== LOGIN PAGE ===== -->
<div class="page active" id="page-login">
<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-logo">
      <img class="brand-logo brand-logo--auth" src="/assets/mbmlogo.png" alt="MSME Bharat Manch" width="72" height="72" />
      <h2>Welcome Back</h2><p>Admin Login to your MSME Bharat Manch account</p>
    </div>
    <div id="loginError" style="display:none" class="error-msg">Invalid email or password. Please try again.</div>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label>Email or Mobile Number *</label>
        <input
          type="text"
          placeholder="Enter your email or 10-digit mobile"
          formControlName="identifier"
          autocomplete="username"
        >
      </div>
      <div class="form-group">
        <label>Password *</label>
        <app-password-input
          placeholder="Your password"
          formControlName="password"
          autocomplete="current-password"
        ></app-password-input>
      </div>
      <button type="submit" class="btn-submit" [disabled]="submitting()">Login</button>
    </form>
  </div>
</div>
</div><!-- /login -->
