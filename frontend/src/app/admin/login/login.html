<!-- ===== LOGIN PAGE ===== -->
<div class="page active" id="page-login">
<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-logo"><span class="brand-icon" style="font-size:2.5rem">🏛️</span><h2>Welcome Back</h2><p>Admin Login to your MSME Bharat Manch account</p></div>
    <div id="loginError" style="display:none" class="error-msg">Invalid email or password. Please try again.</div>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label>Email or Mobile Number *</label>
        <input
          type="text"
          placeholder="Enter your email or 10-digit mobile"
          formControlName="identifier"
          autocomplete="username"
        >
      </div>
      <div class="form-group">
        <label>Password *</label>
        <input
          type="password"
          placeholder="Your password"
          formControlName="password"
          autocomplete="current-password"
        >
      </div>
      <button type="submit" class="btn-submit" [disabled]="submitting()">Login</button>
    </form>
    <!-- <div style="text-align:center;margin-top:1rem"><a [routerLink]="['/admin-forgot-password']" style="color:var(--red);font-size:.88rem;cursor:pointer">Forgot Password?</a></div> -->

      Email: superadmin@msmebharatmanch.com<br>Password: SuperAdmin@123

  </div>
</div>
</div><!-- /login -->
